<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GPGPU: множество листьев (новая модель с текстурой, хвостом и освещением)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #fff; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: black;
            font-family: monospace;
            background: rgba(255,255,255,0.7);
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            white-space: pre-line;
            z-index: 10;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
                "./newLeafModel.js": "./newLeafModel.js"
            }
        }
    </script>
</head>
<body>
    <div id="info">GPGPU: 16x16 листьев (случайные радиус, вертикальный изгиб = 0.2, горизонтальный изгиб динамичен)<br>Освещение: ambient + directional, можно настраивать в GUI</div>
    <script type="module">
        import * as THREE from 'three';
        import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
        import GUI from 'three/addons/libs/lil-gui.module.min.js';
        import { createLeafGeometry, createLeafMaterial } from './newLeafModel.js';

        const gridSize = 16;
        const numLeaves = gridSize * gridSize;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 50);
        camera.lookAt(0, 10, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Параметры физики
        const params = {
            gravity: -10.0,
            damping: 0.99,
            drag: 10.0,
            threshold: -15.0,
            minResetY: 5.0,
            maxResetY: 20.0,
            startAngle: 170.0,
            targetAngle: 180.0,
            elasticity: 0.05,
            momentFactor: 0.01,
            torqueFactor: 0.1,
            angularDamping: 0.99,
            velTorqueFactor: 50.0,
            speedThreshold: 2,
        };

        // Освещение (убрали стандартные источники, теперь всё в шейдере)
        // Но для фона можно добавить слабый ambient light, чтобы тени не были слишком чёрными (опционально)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        // Направленный свет не нужен, так как освещение в шейдере, но добавим для лёгкого фона
        // Если хотим только шейдерное освещение, можно удалить эти источники
        // Оставим минимальный ambientLight для подсветки сцены, но это не влияет на листья (они используют шейдер)
        // Для чистоты эксперимента можно вообще убрать эти источники.
        // Я оставляю только для фоновой подсветки сцены, листья используют свои uniform'ы.

        // Геометрия и материал (новая модель)
        const leafGeometry = createLeafGeometry();
        const leafMaterial = createLeafMaterial();
        const leafMesh = new THREE.InstancedMesh(leafGeometry, leafMaterial, numLeaves);
        scene.add(leafMesh);

        // GPGPU
        const gpuCompute = new GPUComputationRenderer(gridSize, gridSize, renderer);

        const posTexture = gpuCompute.createTexture();
        const velTexture = gpuCompute.createTexture();
        const rotTexture = gpuCompute.createTexture();
        const angVelTexture = gpuCompute.createTexture();
        const hingeTexture = gpuCompute.createTexture();

        // Текстура параметров (RGBA)
        const paramsTexture = gpuCompute.createTexture();
        const paramsData = paramsTexture.image.data;
        for (let i = 0; i < numLeaves; i++) {
            const i4 = i * 4;
            // R: 0.75–0.8 (масштаб)
            paramsData[i4] = 0.75 + Math.random() * 0.3;
            // α (угол формы) – не используется, но оставим
            paramsData[i4 + 1] = 1.0;
            // вертикальный изгиб – фиксирован 0.2
            paramsData[i4 + 2] = 0.2;
            // не используется
            paramsData[i4 + 3] = 0.0;
        }
        paramsTexture.needsUpdate = true;
        leafMesh.material.uniforms.textureParams.value = paramsTexture;

        function initTextures() {
            const posData = posTexture.image.data;
            const velData = velTexture.image.data;
            const rotData = rotTexture.image.data;
            const angVelData = angVelTexture.image.data;
            const hingeData = hingeTexture.image.data;

            for (let i = 0; i < numLeaves; i++) {
                const i4 = i * 4;
                posData[i4] = (Math.random() - 0.5) * 60;
                posData[i4 + 1] = params.minResetY + Math.random() * (params.maxResetY - params.minResetY);
                posData[i4 + 2] = (Math.random() - 0.5) * 60;
                posData[i4 + 3] = 1.0;

                velData[i4] = 0;
                velData[i4 + 1] = 0;
                velData[i4 + 2] = 0;
                velData[i4 + 3] = 1.0;

                const angle = Math.random() * Math.PI * 2;
                const axis = new THREE.Vector3(Math.random(), Math.random(), Math.random()).normalize();
                const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
                rotData[i4] = q.x;
                rotData[i4 + 1] = q.y;
                rotData[i4 + 2] = q.z;
                rotData[i4 + 3] = q.w;

                angVelData[i4] = 0;
                angVelData[i4 + 1] = 0;
                angVelData[i4 + 2] = 0;
                angVelData[i4 + 3] = 1.0;

                hingeData[i4] = params.startAngle * Math.PI / 180;
                hingeData[i4 + 1] = 0.0;
                hingeData[i4 + 2] = 0.0;
                hingeData[i4 + 3] = 1.0;
            }

            posTexture.needsUpdate = true;
            velTexture.needsUpdate = true;
            rotTexture.needsUpdate = true;
            angVelTexture.needsUpdate = true;
            hingeTexture.needsUpdate = true;
        }
        initTextures();

        const rotateFunc = `
            vec3 rotate(vec4 q, vec3 v) {
                return v + 2.0 * cross(q.xyz, cross(q.xyz, v) + q.w * v);
            }
        `;

        // Переменные GPGPU (без изменений, такие же как в предыдущей версии)
        const velocityVar = gpuCompute.addVariable('textureVelocity', `
            uniform float delta;
            uniform float g;
            uniform float threshold;
            uniform float damping;
            uniform float drag;
            
            ${rotateFunc}
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 vel = texture2D(textureVelocity, uv);
                vec4 pos = texture2D(texturePosition, uv);
                vec4 quat = texture2D(textureRotation, uv);
                vec4 hinge = texture2D(textureHinge, uv);
                
                if (pos.y < threshold) {
                    gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                } else {
                    float angle = hinge.x;
                    float ha = angle * 0.5;
                    float sinHa = sin(ha);
                    float cosHa = cos(ha);
                    
                    vec3 localNormal1 = vec3(0.0,  sinHa, cosHa);
                    vec3 localNormal2 = vec3(0.0, -sinHa, cosHa);
                    
                    vec3 worldNormal1 = rotate(quat, localNormal1);
                    vec3 worldNormal2 = rotate(quat, localNormal2);
                    
                    float vn1 = dot(vel.xyz, worldNormal1);
                    float vn2 = dot(vel.xyz, worldNormal2);
                    
                    vec3 force1 = -drag * vn1 * worldNormal1;
                    vec3 force2 = -drag * vn2 * worldNormal2;
                    
                    vec3 totalForce = (force1 + force2) / 2.0;
                    
                    vec3 newVel = vel.xyz * damping + (vec3(0.0, g, 0.0) + totalForce) * delta;
                    
                    gl_FragColor = vec4(newVel, 1.0);
                }
            }
        `, velTexture);

        const angVelVar = gpuCompute.addVariable('textureAngularVelocity', `
            uniform float delta;
            uniform float threshold;
            uniform float drag;
            uniform float torqueFactor;
            uniform float angularDamping;
            uniform float leafHeight;
            uniform float leafWidth;
            uniform float velTorqueFactor;
            uniform float speedThreshold;
            
            ${rotateFunc}
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 angVel = texture2D(textureAngularVelocity, uv);
                vec4 pos = texture2D(texturePosition, uv);
                vec4 quat = texture2D(textureRotation, uv);
                vec4 vel = texture2D(textureVelocity, uv);
                vec4 hinge = texture2D(textureHinge, uv);
                
                if (pos.y < threshold) {
                    gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                } else {
                    float angle = hinge.x;
                    float ha = angle * 0.5;
                    float sinHa = sin(ha);
                    float cosHa = cos(ha);
                    
                    float d = (leafHeight / 2.0) * sinHa;
                    vec3 localCenter1 = vec3(0.0, 0.0, -d);
                    vec3 localCenter2 = vec3(0.0, 0.0,  d);
                    
                    vec3 worldCenter1 = pos.xyz + rotate(quat, localCenter1);
                    vec3 worldCenter2 = pos.xyz + rotate(quat, localCenter2);
                    
                    vec3 axisX = rotate(quat, vec3(1.0, 0.0, 0.0));
                    
                    vec3 offset = dot(vec3(0.0, -leafWidth/2.0, 0.0), axisX) * axisX;
                    
                    vec3 r1 = (worldCenter1 + offset) - pos.xyz;
                    vec3 r2 = (worldCenter2 + offset) - pos.xyz;
                    
                    vec3 localNormal1 = vec3(0.0,  sinHa, cosHa);
                    vec3 localNormal2 = vec3(0.0, -sinHa, cosHa);
                    
                    vec3 worldNormal1 = rotate(quat, localNormal1);
                    vec3 worldNormal2 = rotate(quat, localNormal2);
                    
                    float vn1 = dot(vel.xyz, worldNormal1);
                    float vn2 = dot(vel.xyz, worldNormal2);
                    
                    vec3 force1 = -drag * vn1 * worldNormal1;
                    vec3 force2 = -drag * vn2 * worldNormal2;
                    
                    vec3 torque1 = cross(r1, force1);
                    vec3 torque2 = cross(r2, force2);
                    vec3 totalTorque = torque1 + torque2;
                    
                    float speed = length(vel.xyz);
                    if (speed < speedThreshold && speed > 0.001) {
                        vec3 dir = normalize(cross(axisX, vel.xyz));
                        totalTorque += velTorqueFactor * dir;
                    }
                    
                    vec3 newAngVel = angVel.xyz + totalTorque * delta * torqueFactor;
                    newAngVel *= angularDamping;
                    
                    gl_FragColor = vec4(newAngVel, 1.0);
                }
            }
        `, angVelTexture);

        const positionVar = gpuCompute.addVariable('texturePosition', `
            uniform float delta;
            uniform float threshold;
            uniform float minResetY;
            uniform float maxResetY;
            uniform float time;
            
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 pos = texture2D(texturePosition, uv);
                vec4 vel = texture2D(textureVelocity, uv);
                
                if (pos.y < threshold) {
                    float randX = hash(vec2(uv.x + time, uv.y));
                    float randZ = hash(vec2(uv.y + time, uv.x));
                    float randY = hash(vec2(uv.x + time + 1.0, uv.y + 1.0));
                    float newX = (randX - 0.5) * 60.0;
                    float newZ = (randZ - 0.5) * 60.0;
                    float newY = minResetY + randY * (maxResetY - minResetY);
                    gl_FragColor = vec4(newX, newY, newZ, 1.0);
                } else {
                    gl_FragColor = vec4(pos.xyz + vel.xyz * delta, 1.0);
                }
            }
        `, posTexture);

        const rotationVar = gpuCompute.addVariable('textureRotation', `
            uniform float delta;
            uniform float threshold;
            uniform float time;
            
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }
            
            vec4 randomQuat(vec2 seed) {
                float u1 = hash(seed);
                float u2 = hash(seed + vec2(1.0, 0.0));
                float u3 = hash(seed + vec2(0.0, 1.0));
                
                float theta = 2.0 * 3.14159 * u1;
                float phi = acos(2.0 * u2 - 1.0);
                float r = sqrt(1.0 - u3);
                float R = sqrt(u3);
                
                float x = r * sin(phi) * cos(theta);
                float y = r * sin(phi) * sin(theta);
                float z = r * cos(phi);
                float w = R;
                
                return normalize(vec4(x, y, z, w));
            }
            
            vec4 integrateQuat(vec4 q, vec3 omega, float dt) {
                vec3 halfOmega = 0.5 * omega;
                vec4 qDot = vec4(halfOmega * q.w + cross(halfOmega, q.xyz), -dot(halfOmega, q.xyz));
                return normalize(q + qDot * dt);
            }
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 rot = texture2D(textureRotation, uv);
                vec4 angVel = texture2D(textureAngularVelocity, uv);
                vec4 pos = texture2D(texturePosition, uv);
                
                if (pos.y < threshold) {
                    vec2 seed = vec2(uv.x + time, uv.y + time);
                    gl_FragColor = randomQuat(seed);
                } else {
                    gl_FragColor = integrateQuat(rot, angVel.xyz, delta);
                }
            }
        `, rotTexture);

        const hingeVar = gpuCompute.addVariable('textureHinge', `
            uniform float delta;
            uniform float threshold;
            uniform float targetAngle;
            uniform float elasticity;
            uniform float momentFactor;
            uniform float startAngle;
            uniform float drag;
            uniform float leafHeight;
            
            ${rotateFunc}
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 hinge = texture2D(textureHinge, uv);
                vec4 pos = texture2D(texturePosition, uv);
                vec4 quat = texture2D(textureRotation, uv);
                vec4 vel = texture2D(textureVelocity, uv);
                
                if (pos.y < threshold) {
                    gl_FragColor = vec4(startAngle, 0.0, 0.0, 1.0);
                } else {
                    float angle = hinge.x;
                    float ha = angle * 0.5;
                    float sinHa = sin(ha);
                    float cosHa = cos(ha);
                    
                    float d = (leafHeight / 2.0) * sinHa;
                    vec3 localCenter1 = vec3(0.0, 0.0, -d);
                    vec3 localCenter2 = vec3(0.0, 0.0,  d);
                    
                    vec3 localNormal1 = vec3(0.0,  sinHa, cosHa);
                    vec3 localNormal2 = vec3(0.0, -sinHa, cosHa);
                    
                    vec3 worldNormal1 = rotate(quat, localNormal1);
                    vec3 worldNormal2 = rotate(quat, localNormal2);
                    
                    vec3 worldCenter1 = pos.xyz + rotate(quat, localCenter1);
                    vec3 worldCenter2 = pos.xyz + rotate(quat, localCenter2);
                    
                    vec3 r1 = worldCenter1 - pos.xyz;
                    vec3 r2 = worldCenter2 - pos.xyz;
                    
                    float vn1 = dot(vel.xyz, worldNormal1);
                    float vn2 = dot(vel.xyz, worldNormal2);
                    
                    vec3 force1 = -drag * vn1 * worldNormal1;
                    vec3 force2 = -drag * vn2 * worldNormal2;
                    
                    vec3 axisX = rotate(quat, vec3(1.0, 0.0, 0.0));
                    
                    float moment1 = dot(cross(r1, force1), axisX);
                    float moment2 = dot(cross(r2, force2), axisX);
                    float totalMoment = moment2 - moment1;
                    
                    float deltaElastic = elasticity * (targetAngle - angle) * delta;
                    float deltaMoment = momentFactor * totalMoment * delta;
                    angle += deltaElastic + deltaMoment;
                    
                    if (angle < 0.0) angle = 0.0;
                    if (angle > 2.0 * 3.14159) angle = 2.0 * 3.14159;
                    
                    gl_FragColor = vec4(angle, 0.0, 0.0, 1.0);
                }
            }
        `, hingeTexture);

        gpuCompute.setVariableDependencies(velocityVar, [velocityVar, positionVar, rotationVar, hingeVar]);
        gpuCompute.setVariableDependencies(angVelVar, [angVelVar, positionVar, rotationVar, velocityVar, hingeVar]);
        gpuCompute.setVariableDependencies(positionVar, [positionVar, velocityVar]);
        gpuCompute.setVariableDependencies(rotationVar, [rotationVar, angVelVar, positionVar]);
        gpuCompute.setVariableDependencies(hingeVar, [hingeVar, positionVar, rotationVar, velocityVar]);

        const targetAngleRad = params.targetAngle * Math.PI / 180;
        const startAngleRadVal = params.startAngle * Math.PI / 180;

        velocityVar.material.uniforms.g = { value: params.gravity };
        velocityVar.material.uniforms.threshold = { value: params.threshold };
        velocityVar.material.uniforms.damping = { value: params.damping };
        velocityVar.material.uniforms.drag = { value: params.drag };
        velocityVar.material.uniforms.delta = { value: 0.0 };

        angVelVar.material.uniforms.threshold = { value: params.threshold };
        angVelVar.material.uniforms.drag = { value: params.drag };
        angVelVar.material.uniforms.torqueFactor = { value: params.torqueFactor };
        angVelVar.material.uniforms.angularDamping = { value: params.angularDamping };
        angVelVar.material.uniforms.leafHeight = { value: 3.0 };
        angVelVar.material.uniforms.leafWidth = { value: 2.0 };
        angVelVar.material.uniforms.velTorqueFactor = { value: params.velTorqueFactor };
        angVelVar.material.uniforms.speedThreshold = { value: params.speedThreshold };
        angVelVar.material.uniforms.delta = { value: 0.0 };

        positionVar.material.uniforms.threshold = { value: params.threshold };
        positionVar.material.uniforms.minResetY = { value: params.minResetY };
        positionVar.material.uniforms.maxResetY = { value: params.maxResetY };
        positionVar.material.uniforms.time = { value: 0.0 };
        positionVar.material.uniforms.delta = { value: 0.0 };

        rotationVar.material.uniforms.threshold = { value: params.threshold };
        rotationVar.material.uniforms.time = { value: 0.0 };
        rotationVar.material.uniforms.delta = { value: 0.0 };

        hingeVar.material.uniforms.threshold = { value: params.threshold };
        hingeVar.material.uniforms.targetAngle = { value: targetAngleRad };
        hingeVar.material.uniforms.elasticity = { value: params.elasticity };
        hingeVar.material.uniforms.momentFactor = { value: params.momentFactor };
        hingeVar.material.uniforms.startAngle = { value: startAngleRadVal };
        hingeVar.material.uniforms.drag = { value: params.drag };
        hingeVar.material.uniforms.leafHeight = { value: 3.0 };
        hingeVar.material.uniforms.delta = { value: 0.0 };

        const error = gpuCompute.init();
        if (error) console.error('GPGPU init error:', error);

        // GUI
        const gui = new GUI({ title: 'Параметры' });
        gui.domElement.style.position = 'absolute';
        gui.domElement.style.top = '10px';
        gui.domElement.style.right = '10px';
        gui.domElement.style.zIndex = '100';

        gui.add(params, 'gravity', -20, 0, 0.1).name('Гравитация').onChange(v => velocityVar.material.uniforms.g.value = v);
        gui.add(params, 'damping', 0.9, 1, 0.001).name('Затухание скорости').onChange(v => velocityVar.material.uniforms.damping.value = v);
        gui.add(params, 'drag', 0, 20, 0.1).name('Сопротивление').onChange(v => {
            velocityVar.material.uniforms.drag.value = v;
            angVelVar.material.uniforms.drag.value = v;
            hingeVar.material.uniforms.drag.value = v;
        });
        gui.add(params, 'threshold', -30, 0, 0.1).name('Порог Y').onChange(v => {
            velocityVar.material.uniforms.threshold.value = v;
            angVelVar.material.uniforms.threshold.value = v;
            positionVar.material.uniforms.threshold.value = v;
            rotationVar.material.uniforms.threshold.value = v;
            hingeVar.material.uniforms.threshold.value = v;
        });
        gui.add(params, 'minResetY', 0, 30, 0.1).name('Мин. Y сброса').onChange(v => positionVar.material.uniforms.minResetY.value = v);
        gui.add(params, 'maxResetY', 0, 30, 0.1).name('Макс. Y сброса').onChange(v => positionVar.material.uniforms.maxResetY.value = v);
        gui.add(params, 'startAngle', 0, 360, 1).name('Начальный угол').onChange(v => {
            hingeVar.material.uniforms.startAngle.value = v * Math.PI / 180;
        });
        gui.add(params, 'targetAngle', 0, 360, 1).name('Целевой угол').onChange(v => hingeVar.material.uniforms.targetAngle.value = v * Math.PI / 180);
        gui.add(params, 'elasticity', 0, 0.2, 0.001).name('Упругость').onChange(v => hingeVar.material.uniforms.elasticity.value = v);
        gui.add(params, 'momentFactor', 0, 0.1, 0.001).name('Момент сгиба').onChange(v => hingeVar.material.uniforms.momentFactor.value = v);
        gui.add(params, 'torqueFactor', 0, 1, 0.01).name('Коэф. момента группы').onChange(v => angVelVar.material.uniforms.torqueFactor.value = v);
        gui.add(params, 'angularDamping', 0.9, 1, 0.001).name('Демпф. вращения').onChange(v => angVelVar.material.uniforms.angularDamping.value = v);
        gui.add(params, 'velTorqueFactor', 0, 100, 1).name('Пост. момент').onChange(v => angVelVar.material.uniforms.velTorqueFactor.value = v);
        gui.add(params, 'speedThreshold', 0, 5, 0.1).name('Порог скорости').onChange(v => angVelVar.material.uniforms.speedThreshold.value = v);

        // ==================== ДОБАВЛЕННЫЙ БЛОК: Управление освещением ====================
        const lightingFolder = gui.addFolder('Освещение');
        lightingFolder.open();

        const ambientColor = leafMaterial.uniforms.ambientColor.value;
        lightingFolder.add(ambientColor, 'r', 0, 1, 0.01).name('Ambient R').onChange(() => leafMaterial.uniforms.ambientColor.needsUpdate = true);
        lightingFolder.add(ambientColor, 'g', 0, 1, 0.01).name('Ambient G').onChange(() => leafMaterial.uniforms.ambientColor.needsUpdate = true);
        lightingFolder.add(ambientColor, 'b', 0, 1, 0.01).name('Ambient B').onChange(() => leafMaterial.uniforms.ambientColor.needsUpdate = true);

        const lightColor = leafMaterial.uniforms.lightColor.value;
        lightingFolder.add(lightColor, 'r', 0, 1, 0.01).name('Light R').onChange(() => leafMaterial.uniforms.lightColor.needsUpdate = true);
        lightingFolder.add(lightColor, 'g', 0, 1, 0.01).name('Light G').onChange(() => leafMaterial.uniforms.lightColor.needsUpdate = true);
        lightingFolder.add(lightColor, 'b', 0, 1, 0.01).name('Light B').onChange(() => leafMaterial.uniforms.lightColor.needsUpdate = true);

        const lightDirHelper = {
            x: leafMaterial.uniforms.lightDir.value.x,
            y: leafMaterial.uniforms.lightDir.value.y,
            z: leafMaterial.uniforms.lightDir.value.z,
        };
        lightingFolder.add(lightDirHelper, 'x', -1, 1, 0.01).name('Light Dir X').onChange(v => {
            leafMaterial.uniforms.lightDir.value.set(v, lightDirHelper.y, lightDirHelper.z).normalize();
        });
        lightingFolder.add(lightDirHelper, 'y', -1, 1, 0.01).name('Light Dir Y').onChange(v => {
            leafMaterial.uniforms.lightDir.value.set(lightDirHelper.x, v, lightDirHelper.z).normalize();
        });
        lightingFolder.add(lightDirHelper, 'z', -1, 1, 0.01).name('Light Dir Z').onChange(v => {
            leafMaterial.uniforms.lightDir.value.set(lightDirHelper.x, lightDirHelper.y, v).normalize();
        });
        // ==================== КОНЕЦ ДОБАВЛЕННОГО БЛОКА ====================

        // Вращение камеры мышью
        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;
        let cameraPhi = 0;
        let cameraTheta = 0;
        let cameraDistance = 70;
        const center = new THREE.Vector3(0, 10, 0);

        (function initCameraAngles() {
            const dir = new THREE.Vector3().subVectors(camera.position, center);
            cameraDistance = dir.length();
            cameraPhi = Math.atan2(dir.z, dir.x);
            cameraTheta = Math.acos(dir.y / cameraDistance);
        })();

        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isMouseDown = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                renderer.domElement.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            const dx = e.clientX - lastMouseX;
            const dy = e.clientY - lastMouseY;
            cameraPhi += dx * 0.01;
            cameraTheta += dy * 0.01;
            cameraTheta = Math.max(0.1, Math.min(Math.PI - 0.1, cameraTheta));
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;

            const x = center.x + cameraDistance * Math.sin(cameraTheta) * Math.cos(cameraPhi);
            const y = center.y + cameraDistance * Math.cos(cameraTheta);
            const z = center.z + cameraDistance * Math.sin(cameraTheta) * Math.sin(cameraPhi);
            camera.position.set(x, y, z);
            camera.lookAt(center);
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                isMouseDown = false;
                renderer.domElement.style.cursor = 'default';
            }
        });

        const clock = new THREE.Clock();
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1);
            time += delta;

            positionVar.material.uniforms.time.value = time;
            rotationVar.material.uniforms.time.value = time;

            positionVar.material.uniforms.delta.value = delta;
            velocityVar.material.uniforms.delta.value = delta;
            angVelVar.material.uniforms.delta.value = delta;
            rotationVar.material.uniforms.delta.value = delta;
            hingeVar.material.uniforms.delta.value = delta;

            gpuCompute.compute();

            const posTex = gpuCompute.getCurrentRenderTarget(positionVar).texture;
            const rotTex = gpuCompute.getCurrentRenderTarget(rotationVar).texture;
            const hingeTex = gpuCompute.getCurrentRenderTarget(hingeVar).texture;

            leafMesh.material.uniforms.texturePosition.value = posTex;
            leafMesh.material.uniforms.textureRotation.value = rotTex;
            leafMesh.material.uniforms.textureHinge.value = hingeTex;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
